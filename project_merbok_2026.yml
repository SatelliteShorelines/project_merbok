
name: project_merbok_2026_full
channels:
  - conda-forge
  - defaults

variables:
  LD_LIBRARY_PATH: ""
  TF_FORCE_GPU_ALLOW_GROWTH: "true"
  TF_CPP_MIN_LOG_LEVEL: "2"
  PIP_INDEX_URL: "https://download.pytorch.org/whl/cu121"

dependencies:
  - python=3.11
  - pip
  - wheel
  - setuptools>=68,<82

  - gdal
  - libgdal
  - rasterio
  - rioxarray
  - fiona
  - pyproj
  - geopandas
  - shapely
  - proj
  - cartopy
  - pyogrio

  - hdf5
  - netcdf4
  - xarray
  - pyarrow
  - pandas
  - numpy
  - scipy

  - matplotlib
  - ipykernel
  - jupyterlab
  - bokeh
  - panel
  - holoviews
  - plotly
  - folium
  - ipyleaflet
  - ipywidgets
  - matplotlib-scalebar

  - scikit-image
  - scikit-learn

  - rio-tiler
  - rio-cogeo
  - localtileserver
  - leafmap>=0.60
  - contextily

  - arosics
  - kneed
  - line_profiler

  - earthengine-api
  - coastsat-package

  - requests=2.32.5
  - urllib3=2.6.*
  - charset-normalizer=3.4.*
  - chardet<6

  - pip:
      - transformers==4.56.2
      - tokenizers==0.22.2
      - "huggingface_hub>=0.22,<2"
      - safetensors>=0.4.2,<0.5

      # PyTorch GPU (CUDA 12.1) from official index
      - torch==2.2.2
      - torchvision==0.17.2
      - torchaudio==2.2.2

      # TensorFlow CPU (avoids CUDA lib conflicts with PyTorch)
      - tensorflow==2.15.1
      - tf-keras==2.15.1

      - coastseg
      - doodleverse_utils
